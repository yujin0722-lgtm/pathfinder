<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パスファインダー</title>
<style>
  /* Citrailと同系統だが、差し色(--accent)だけ変えた配色。派生アプリと分かるようにするため。 */
  :root {
    --canvas: #F3F6F8; --panel: #FFFFFF; --ink: #1C2B33; --sub: #5B6B77;
    --line: #DDE5EA; --accent: #1B5FA6; --accent-soft: #E4EDF7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: "Hiragino Kaku Gothic ProN","Meiryo",sans-serif; color: var(--ink); }
  #app { display: flex; flex-direction: column; height: 100vh; }

  #topbar { flex: none; min-height: 56px; display: flex; align-items: center; gap: 10px; padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--panel); overflow-x: auto; overflow-y: hidden; }
  #topbar > * { flex-shrink: 0; }
  #header-question { font-size: 14.5px; font-weight: 600; color: var(--ink); max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
  #header-question:hover { background: var(--accent-soft); color: var(--accent); }
  #header-question.placeholder { color: var(--sub); font-weight: 400; font-style: italic; }
  #topbar .spacer { flex: 1; min-width: 8px; }
  #topbar button { border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  #topbar button:hover { border-color: var(--accent); color: var(--accent); }
  #topbar button:disabled { opacity: 0.35; cursor: not-allowed; }
  #savenote { font-size: 12px; color: #1a7a3c; background: #eafff0; border: 1px solid #b7ecc6; padding: 4px 10px; border-radius: 6px; }

  #main { flex: 1; display: flex; min-height: 0; }

  #toolbar { width: 84px; border-right: 1px solid var(--line); background: var(--canvas); display: flex; flex-direction: column; align-items: stretch; padding: 10px 6px; gap: 4px; overflow-y: auto; }
  #toolbar button { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 2px; border: 1px solid transparent; background: transparent; border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--ink); }
  #toolbar button:hover { background: var(--accent-soft); }
  #toolbar button.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  #toolbar button:disabled { opacity: 0.3; cursor: not-allowed; background: transparent; }
  #toolbar button .ic { font-size: 18px; line-height: 1; }
  #toolbar hr { width: 100%; border: none; border-top: 1px solid var(--line); margin: 4px 0; }

  #canvas-wrap { flex: 1; position: relative; background: var(--canvas); overflow: hidden; }
  svg#canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  svg#canvas.mode-add cursor: copy;
  svg#canvas.mode-add-paper, svg#canvas.mode-add-question, svg#canvas.mode-add-conclusion, svg#canvas.mode-add-memo { cursor: copy; }
  svg#canvas.mode-add-edge { cursor: crosshair; }
  svg#canvas.mode-pan { cursor: grab; }

  /* グリッド背景: ノード・リンクより必ず後ろに描画され、クリックも一切奪わないようにする */
  #gridBg { pointer-events: none; display: none; }
  #gridBg.visible { display: block; }

  .node-shape { stroke: #666; stroke-width: 1.3; cursor: move; }
  .node-shape.selected { stroke: var(--accent); stroke-width: 2.6; }
  .node-shape.type-question, .node-shape.type-conclusion { stroke-width: 2; }
  .node-shape.type-question.selected, .node-shape.type-conclusion.selected { stroke-width: 3; }
  .node-label { font-size: 12px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; fill: var(--ink); }
  .resize-handle { fill: var(--panel); stroke: var(--accent); stroke-width: 1.5; cursor: nwse-resize; }

  .edge-path { fill: none; stroke-width: 2; cursor: pointer; }
  .edge-hit { fill: none; stroke: transparent; stroke-width: 14; cursor: pointer; }
  .edge-path.selected { stroke-width: 3; filter: drop-shadow(0 0 1px var(--accent)); }
  .edge-label-bg { fill: #fff; stroke: #ccc; stroke-width: 1; }
  .edge-label { font-size: 11px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }

  #hint { position: absolute; left: 12px; bottom: 12px; background: rgba(255,255,255,0.9); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--sub); max-width: 360px; pointer-events: none; }

  #proppanel-wrap { position: relative; flex: none; display: flex; }
  #proppanel { width: 300px; border-left: 1px solid var(--line); background: var(--panel); padding: 14px; overflow-y: auto; transition: width .15s, padding .15s; }
  #proppanel-wrap.collapsed #proppanel { width: 0; padding: 14px 0; overflow: hidden; border-left: none; }
  #panel-toggle { position: absolute; top: 12px; left: -14px; width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--line); background: var(--panel); color: var(--sub); cursor: pointer; font-size: 11px; line-height: 1; z-index: 5; }
  #panel-toggle:hover { border-color: var(--accent); color: var(--accent); }
  #proppanel h3 { font-size: 13px; margin: 0 0 10px; color: var(--sub); font-weight: 600; }
  #proppanel .empty { font-size: 13px; color: var(--sub); margin-top: 20px; }
  #proppanel label { display: block; font-size: 12px; color: var(--sub); margin: 12px 0 4px; }
  #proppanel input[type=text], #proppanel textarea, #proppanel select { width: 100%; padding: 7px 8px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px; font-family: inherit; }
  #proppanel input:focus, #proppanel textarea:focus, #proppanel select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  #proppanel textarea { resize: vertical; min-height: 56px; }
  #proppanel .row2 { display: flex; gap: 8px; }
  #proppanel .row2 > div { flex: 1; }
  #delbtn { margin-top: 18px; width: 100%; padding: 8px; border: 1px solid #e3a; background: #fff0f5; color: #a02050; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #delbtn:hover { background: #ffe0ea; }

  .swatch-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin: 6px 0 4px; }
  .swatch { width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; border: 1px solid var(--line); cursor: pointer; display: block; }
  .swatch.selected { border: 2px solid var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }

  #statusbar { flex: none; height: 30px; display: flex; align-items: center; gap: 20px; padding: 0 16px; border-top: 1px solid var(--line); font-size: 12px; color: var(--sub); background: var(--panel); }

  #mapsModal { display: none; position: fixed; inset: 0; background: rgba(28,43,51,0.45); align-items: center; justify-content: center; z-index: 50; }
  #mapsModal .box { background: var(--panel); border-radius: 10px; padding: 20px; width: 440px; max-height: 70vh; overflow-y: auto; }
  #mapsModal h3 { margin: 0 0 12px; font-size: 15px; }
  .map-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); gap: 10px; }
  .map-row .meta { font-size: 12px; color: var(--sub); }
  .map-row .name { font-size: 13px; }
  .map-row .name.current { font-weight: 700; }
  .map-row button { border: 1px solid var(--line); background: var(--panel); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }

  /* 疑似フルスクリーン(Citrailと同じ方式): ヘッダー等を隠してキャンバスを広げる */
  body.fullscreen #topbar, body.fullscreen #toolbar, body.fullscreen #statusbar { display: none; }
  body.fullscreen #proppanel-wrap.collapsed #panel-toggle { display: none; }
  /* 全画面表示ボタン自体がヘッダーごと隠れて抜け出せなくならないよう、
     終了専用のボタンをキャンバス上に常に浮かせておく */
  #btn-exit-fullscreen { display: none; position: fixed; top: 10px; right: 10px; z-index: 20; border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  #btn-exit-fullscreen:hover { border-color: var(--accent); color: var(--accent); }
  body.fullscreen #btn-exit-fullscreen { display: block; }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="header-question" title="クリックすると臨床疑問ノードを編集できます">（臨床疑問未設定）</div>
    <button id="btn-new" title="新しい地図をこの一覧に追加して開く">新しい地図</button>
    <button id="btn-maps" title="保存されている地図の一覧を開く">地図一覧</button>
    <button id="btn-export-json" title="今の地図をJSONファイルとして書き出す">JSONで書き出し</button>
    <button id="btn-import-json" title="JSONファイルから読み込む">JSONを読み込む</button>
    <input type="file" id="import-json-input" accept="application/json,.json" style="display:none;">
    <button id="btn-export-png" title="今の地図をPNG画像として書き出す">🖼 PNG保存</button>
    <button id="btn-apikey" title="OpenAlexのAPIキーを設定します(Citrailと共有されます)">APIキー設定</button>
    <div class="spacer"></div>
    <button id="btn-fullscreen" title="ヘッダーとツールバーを隠して地図を広げます">⛶ 全画面表示</button>
    <span id="savenote">保存済み</span>
  </div>

  <div id="main">
    <div id="toolbar">
      <button data-tool="select" class="active" title="選択"><span class="ic">&#8598;</span>選択</button>
      <button data-tool="add-paper" title="エビデンスノードを追加"><span class="ic">&#128196;</span>エビデンス</button>
      <button data-tool="add-question" id="btn-add-question" title="臨床疑問ノードを追加(地図に1つまで)"><span class="ic">&#10067;</span>疑問</button>
      <button data-tool="add-conclusion" id="btn-add-conclusion" title="自分の結論ノードを追加(地図に1つまで)"><span class="ic">&#9989;</span>結論</button>
      <button data-tool="add-memo" title="メモノートを追加"><span class="ic">&#128221;</span>メモ</button>
      <button data-tool="add-edge" title="2つのノードを線でつなぐ"><span class="ic">&#128279;</span>線</button>
      <hr>
      <button id="btn-zoomin" title="拡大"><span class="ic">+</span>拡大</button>
      <button id="btn-zoomout" title="縮小"><span class="ic">-</span>縮小</button>
      <button id="btn-fit" title="全体が収まるように表示"><span class="ic">&#10530;</span>全体表示</button>
      <button id="btn-grid" title="背景のグリッド線を表示/非表示"><span class="ic">&#9638;</span>グリッド</button>
      <button id="btn-layout-year" title="発表年に基づいてエビデンスノードを整列します(発表年のないノードは動きません)"><span class="ic">&#128197;</span>年代整列</button>
      <hr>
      <button id="btn-undo" title="元に戻す"><span class="ic">&#8630;</span>戻す</button>
      <button id="btn-redo" title="やり直し"><span class="ic">&#8631;</span>進む</button>
    </div>

    <div id="canvas-wrap">
      <svg id="canvas">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path>
          </marker>
          <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#DCE2E7" stroke-width="1"></path>
          </pattern>
        </defs>
        <g id="viewport">
          <rect id="gridBg" x="-6000" y="-6000" width="12000" height="12000" fill="url(#gridPattern)"></rect>
          <g id="edgeLayer"></g>
          <g id="nodeLayer"></g>
        </g>
      </svg>
      <div id="hint"></div>
    </div>

    <div id="proppanel-wrap">
      <button id="panel-toggle" title="パネルの表示/非表示">▶</button>
      <div id="proppanel"></div>
    </div>
  </div>

  <div id="statusbar">
    <span id="stat-nodes">ノード: 0</span>
    <span id="stat-edges">リンク: 0</span>
    <span id="stat-zoom">ズーム: 100%</span>
  </div>

  <button id="btn-exit-fullscreen" title="全画面表示を終了(Escキーでも終了できます)">✕ 全画面終了</button>

  <div id="mapsModal">
    <div class="box">
      <h3>地図一覧</h3>
      <div id="mapsList"></div>
      <button id="btn-close-maps" style="margin-top:14px;">閉じる</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  var STUDY_TYPES = ["RCT","META","REVIEW","OBS","GUIDE","CASE","OTHER"];
  var STUDY_LABEL = { RCT: "RCT", META: "メタ解析・SR", REVIEW: "レビュー", OBS: "観察研究", GUIDE: "ガイドライン", CASE: "症例報告", OTHER: "その他・未定" };

  var EDGE_CATEGORIES = ["support","oppose","supplement","free"];
  var EDGE_CATEGORY_LABEL = { support: "支持する", oppose: "反論する", supplement: "補足する", free: "分類なし(自由記述)" };
  var EDGE_CATEGORY_DEFAULT_COLOR = { support: "#2e7d32", oppose: "#c62828", supplement: "#546e7a", free: "#8d6e63" };
  var EDGE_COLOR_PRESETS = ["#2e7d32","#c62828","#546e7a","#8d6e63","#1565c0","#6a1b9a"];

  var svg = document.getElementById('canvas');
  var viewport = document.getElementById('viewport');
  var nodeLayer = document.getElementById('nodeLayer');
  var edgeLayer = document.getElementById('edgeLayer');
  var proppanel = document.getElementById('proppanel');
  var hintEl = document.getElementById('hint');
  var headerQuestionEl = document.getElementById('header-question');

  function emptyState(){
    return { title: "無題の地図", nodes: [], edges: [], nextId: 1 };
  }
  var state = emptyState();

  /* ---- ヘッダー表示(地図名の代わりに臨床疑問ノードの内容を表示する) ---- */
  function getQuestionNode(){
    return state.nodes.find(function(n){ return n.nodeType === 'question'; }) || null;
  }
  function syncTitleFromQuestion(){
    var q = getQuestionNode();
    state.title = (q && (q.text||'').trim()) ? q.text.trim() : '無題の地図';
  }
  function updateHeaderQuestion(){
    var q = getQuestionNode();
    if (q && (q.text||'').trim()){
      headerQuestionEl.textContent = q.text.trim();
      headerQuestionEl.classList.remove('placeholder');
    } else {
      headerQuestionEl.textContent = '（臨床疑問未設定）';
      headerQuestionEl.classList.add('placeholder');
    }
  }
  function refreshTitleDisplay(){
    syncTitleFromQuestion();
    updateHeaderQuestion();
  }

  var view = { x: 0, y: 0, scale: 1 };
  var tool = 'select';
  var selected = { type: null, id: null };
  var edgeDraftSource = null;
  var history = [];
  var future = [];
  var dragging = null;
  var resizing = null;
  var isPanning = false;
  var panStart = null;
  var MIN_NODE_WIDTH = 70, MIN_NODE_HEIGHT = 50;

  function newId(prefix){
    var id = prefix + '_' + state.nextId;
    state.nextId += 1;
    return id;
  }

  function getNode(id){ for (var i=0;i<state.nodes.length;i++) if (state.nodes[i].id===id) return state.nodes[i]; return null; }
  function getEdge(id){ for (var i=0;i<state.edges.length;i++) if (state.edges[i].id===id) return state.edges[i]; return null; }

  /* ---- 履歴(元に戻す/やり直し) ---- */
  function snapshot(){ return JSON.stringify(state); }
  function pushHistory(){
    history.push(snapshot());
    if (history.length > 60) history.shift();
    future = [];
    autosave();
  }
  function undo(){
    if (!history.length) return;
    future.push(snapshot());
    state = JSON.parse(history.pop());
    refreshTitleDisplay();
    selected = { type: null, id: null };
    render();
    autosave();
  }
  function redo(){
    if (!future.length) return;
    history.push(snapshot());
    state = JSON.parse(future.pop());
    refreshTitleDisplay();
    selected = { type: null, id: null };
    render();
    autosave();
  }

  /* ---- Local Storage 自動保存(複数地図の一覧管理) ---- */
  function storageAvailable(){
    try { localStorage.setItem('__pf_test','1'); localStorage.removeItem('__pf_test'); return true; } catch(e){ return false; }
  }
  var HAS_STORAGE = storageAvailable();

  var MAPS_INDEX_KEY = 'pf_maps_index';
  var LAST_MAP_KEY = 'pf_last_map_id';
  var LEGACY_MAP_KEY = 'pf_current_map'; // v0.1で使っていた単一地図の保存先(移行用)
  function mapDataKey(id){ return 'pf_map_' + id; }
  function genMapId(){ return 'map_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

  var currentMapId = null;

  function loadMapsIndex(){
    if (!HAS_STORAGE) return [];
    try { return JSON.parse(localStorage.getItem(MAPS_INDEX_KEY) || '[]'); } catch(e){ return []; }
  }
  function saveMapsIndex(index){
    if (!HAS_STORAGE) return;
    try { localStorage.setItem(MAPS_INDEX_KEY, JSON.stringify(index)); } catch(e){}
  }

  /* v0.1(単一地図のみ)のデータが残っている場合、一覧形式に移行する */
  function migrateLegacyIfNeeded(){
    if (!HAS_STORAGE) return;
    if (localStorage.getItem(MAPS_INDEX_KEY)) return;
    var legacyRaw = localStorage.getItem(LEGACY_MAP_KEY);
    var data = null;
    try { data = legacyRaw ? JSON.parse(legacyRaw) : null; } catch(e){ data = null; }
    if (!data || !Array.isArray(data.nodes)) return;
    var id = genMapId();
    localStorage.setItem(mapDataKey(id), JSON.stringify(data));
    saveMapsIndex([{ id: id, title: data.title || '無題の地図', updatedAt: new Date().toISOString() }]);
    localStorage.setItem(LAST_MAP_KEY, id);
    localStorage.removeItem(LEGACY_MAP_KEY);
  }

  var saveTimer = null;
  function autosave(){
    if (!HAS_STORAGE || !currentMapId) return;
    var note = document.getElementById('savenote');
    note.textContent = '保存中…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      try {
        localStorage.setItem(mapDataKey(currentMapId), JSON.stringify(state));
        localStorage.setItem(LAST_MAP_KEY, currentMapId);
        var index = loadMapsIndex();
        var entry = index.find(function(m){ return m.id === currentMapId; });
        var now = new Date().toISOString();
        if (entry){ entry.title = state.title; entry.updatedAt = now; }
        else { index.push({ id: currentMapId, title: state.title, updatedAt: now }); }
        saveMapsIndex(index);
        var t = new Date();
        note.textContent = '保存済み(' + t.getHours() + ':' + String(t.getMinutes()).padStart(2,'0') + ')';
      } catch(e){
        note.textContent = '保存に失敗しました';
      }
    }, 500);
  }

  function loadMapData(id){
    if (!HAS_STORAGE) return null;
    try {
      var raw = localStorage.getItem(mapDataKey(id));
      if (!raw) return null;
      var loaded = JSON.parse(raw);
      if (!loaded || !Array.isArray(loaded.nodes)) return null;
      return loaded;
    } catch(e){ return null; }
  }

  function openMap(id){
    var data = loadMapData(id);
    if (!data) return false;
    currentMapId = id;
    state = data;
    refreshTitleDisplay();
    history = []; future = []; selected = { type:null, id:null };
    render(); fitToView();
    localStorage.setItem(LAST_MAP_KEY, id);
    return true;
  }

  function createNewMap(){
    currentMapId = genMapId();
    state = emptyState();
    refreshTitleDisplay();
    history = []; future = []; selected = { type:null, id:null };
    render(); fitToView(); pushHistory();
  }

  function deleteMap(id){
    var index = loadMapsIndex().filter(function(m){ return m.id !== id; });
    saveMapsIndex(index);
    try { localStorage.removeItem(mapDataKey(id)); } catch(e){}
    if (id === currentMapId){
      if (index.length){ openMap(index[0].id); }
      else { createNewMap(); }
    }
  }

  /* 初回起動時: 一覧に地図があれば直前に開いていたものを、なければ新規地図を開く */
  function loadInitialMap(){
    migrateLegacyIfNeeded();
    var index = loadMapsIndex();
    var lastId = HAS_STORAGE ? localStorage.getItem(LAST_MAP_KEY) : null;
    if (lastId && index.some(function(m){ return m.id === lastId; }) && openMap(lastId)) return;
    if (index.length && openMap(index[0].id)) return;
    createNewMap();
  }

  /* ---- 地図一覧モーダル ---- */
  function openMapsModal(){
    document.getElementById('mapsModal').style.display = 'flex';
    renderMapsList();
  }
  function closeMapsModal(){
    document.getElementById('mapsModal').style.display = 'none';
  }
  function renderMapsList(){
    var listEl = document.getElementById('mapsList');
    var index = loadMapsIndex().slice().sort(function(a,b){ return (b.updatedAt||'').localeCompare(a.updatedAt||''); });
    if (!index.length){ listEl.textContent = '保存された地図はまだありません。'; return; }
    listEl.innerHTML = '';
    index.forEach(function(m){
      var row = document.createElement('div');
      row.className = 'map-row';

      var infoWrap = document.createElement('div');
      var nameEl = document.createElement('div');
      nameEl.className = 'name' + (m.id === currentMapId ? ' current' : '');
      nameEl.textContent = m.title || '無題の地図';
      nameEl.style.cursor = 'default';
      nameEl.title = '地図の名前は臨床疑問ノードの内容から自動的に決まります';

      var metaEl = document.createElement('div');
      metaEl.className = 'meta';
      var d = m.updatedAt ? new Date(m.updatedAt) : null;
      metaEl.textContent = d ? (d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')) : '';

      infoWrap.appendChild(nameEl);
      infoWrap.appendChild(metaEl);
      row.appendChild(infoWrap);

      var openBtn = document.createElement('button');
      openBtn.textContent = m.id === currentMapId ? '開いています' : '開く';
      openBtn.disabled = (m.id === currentMapId);
      openBtn.addEventListener('click', function(){ closeMapsModal(); openMap(m.id); });
      row.appendChild(openBtn);

      var delBtn = document.createElement('button');
      delBtn.textContent = '削除';
      delBtn.style.color = '#a02050'; delBtn.style.borderColor = '#e3a1b8';
      delBtn.addEventListener('click', function(){
        if (!confirm('「' + (m.title || '無題の地図') + '」を削除しますか？この操作は取り消せません。')) return;
        deleteMap(m.id);
        renderMapsList();
      });
      row.appendChild(delBtn);

      listEl.appendChild(row);
    });
  }

  /* ---- OpenAlex連携(DOI自動取得・研究種別判定・自動リンク) ---- */
  /* CitrailのAPIキー保存先(chm_openalex_key)を共有し、二重入力を避ける */
  var OPENALEX_KEY_STORAGE = 'chm_openalex_key';
  function getApiKey(){ try { return localStorage.getItem(OPENALEX_KEY_STORAGE) || ''; } catch(e){ return ''; } }
  function saveApiKey(key){ try { localStorage.setItem(OPENALEX_KEY_STORAGE, (key||'').trim()); } catch(e){} }

  var OPENALEX_BASE = 'https://api.openalex.org';
  var OPENALEX_SELECT = ['id','display_name','authorships','publication_year','primary_location','doi','ids','referenced_works','type'].join(',');

  function ApiError(code, status){ this.code = code; this.status = status; }
  ApiError.prototype = Object.create(Error.prototype);

  function apiGet(path, params){
    var url = new URL(OPENALEX_BASE + path);
    for (var k in params) url.searchParams.set(k, params[k]);
    var key = getApiKey();
    if (key) url.searchParams.set('api_key', key);
    return fetch(url.toString()).catch(function(){ throw new ApiError('network'); }).then(function(res){
      if (res.status === 404) throw new ApiError('notfound', 404);
      if (res.status === 401 || res.status === 403) throw new ApiError('auth', res.status);
      if (res.status === 409 || res.status === 429) throw new ApiError('limit', res.status);
      if (!res.ok) throw new ApiError('other', res.status);
      return res.json().catch(function(){ throw new ApiError('badresponse'); });
    });
  }

  function shortOAId(u){ return u ? String(u).replace(/^https?:\/\/openalex\.org\//,'') : null; }
  function stripDoiUrl(u){ return u ? String(u).replace(/^https?:\/\/(?:dx\.)?doi\.org\//i,'') : null; }
  function extractPmid(u){ if (!u) return null; var m = String(u).match(/(\d+)\s*\/?\s*$/); return m ? m[1] : null; }

  function normalizeDoi(raw){
    var s = (raw||'').trim();
    if (!s) return null;
    var m = s.match(/^https?:\/\/(?:dx\.)?doi\.org\/(10\..+)$/i);
    if (m) return decodeURIComponent(m[1]);
    m = s.match(/^doi:\s*(10\..+)$/i);
    if (m) return m[1].trim();
    if (/^10\.\S+\/\S+/.test(s)) return s;
    return null;
  }

  /* 研究種別の暫定判定(タイトル・OpenAlexのtypeによるヒューリスティック。Citrailのapi.jsを流用) */
  function classifyStudyFromTitle(w){
    var t = (w.display_name||'').toLowerCase();
    if (/meta-?analys|systematic review/.test(t)) return 'META';
    if (/randomi[sz]ed|randomi[sz]ation/.test(t)) return 'RCT';
    if (/cohort|case-?control|cross-?sectional|observational|registry|surveillance|longitudinal|retrospective|prospective|follow-?up study/.test(t)) return 'OBS';
    if (/case report|case series/.test(t)) return 'CASE';
    if (w.type === 'review' || /\breview\b/.test(t)) return 'REVIEW';
    return 'OTHER';
  }

  function toPaperFields(w){
    return {
      title: w.display_name || '(タイトル情報なし)',
      authors: (w.authorships||[]).map(function(a){ return a.author && a.author.display_name; }).filter(Boolean).join(', '),
      year: (w.publication_year!=null) ? String(w.publication_year) : '',
      journal: (w.primary_location && w.primary_location.source && w.primary_location.source.display_name) || '',
      doi: stripDoiUrl(w.doi),
      pmid: extractPmid(w.ids && w.ids.pmid),
      openalexId: shortOAId(w.id),
      referencedWorks: (w.referenced_works||[]).map(shortOAId),
      studyType: classifyStudyFromTitle(w)
    };
  }

  /* PMIDがある場合、PubMed公式のPublication Typeで研究種別を上書き(Citrailと同じ方針) */
  function classifyFromPubTypes(types){
    var t = types.map(function(x){ return String(x).toLowerCase(); });
    function has(s){ return t.some(function(x){ return x.indexOf(s) !== -1; }); }
    if (has('meta-analysis') || has('systematic review')) return 'META';
    if (has('randomized controlled trial')) return 'RCT';
    if (has('guideline')) return 'GUIDE';
    if (has('observational study')) return 'OBS';
    if (has('case reports')) return 'CASE';
    if (has('review')) return 'REVIEW';
    return null;
  }
  function fetchPubTypeCategory(pmid){
    var url = 'https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&retmode=json&id=' + encodeURIComponent(pmid);
    return fetch(url).then(function(res){
      if (!res.ok) return null;
      return res.json().then(function(data){
        var rec = data.result && data.result[pmid];
        if (rec && Array.isArray(rec.pubtype)) return classifyFromPubTypes(rec.pubtype);
        return null;
      });
    }).catch(function(){ return null; });
  }

  function apiErrorMessage(e){
    switch (e && e.code){
      case 'notfound': return 'このエビデンスがOpenAlexで見つかりませんでした。DOIが正しいか確認してください。';
      case 'auth': return 'APIキーが設定されていないか無効です。「APIキー設定」からOpenAlexの無料APIキーを登録してください。';
      case 'limit': return 'データ提供元(OpenAlex)の利用上限に達した可能性があります。時間を置いて再度お試しください。';
      case 'network': return '通信エラーが発生しました。インターネット接続を確認してください。';
      case 'badresponse': return 'データの形式に問題があり読み込めませんでした。';
      default: return 'エビデンスの情報を取得できませんでした。';
    }
  }

  function fetchAndApplyDoi(node, doiRaw){
    var doi = normalizeDoi(doiRaw);
    if (!doi){ alert('DOIの形式を確認してください(例: 10.1001/xxxxx)'); return; }
    var btn = document.getElementById('f-doi-fetch');
    if (btn){ btn.disabled = true; btn.textContent = '取得中…'; }
    apiGet('/works/doi:' + encodeURIComponent(doi), { select: OPENALEX_SELECT }).then(function(w){
      var p = toPaperFields(w);
      node.doi = p.doi || doi;
      node.title = p.title;
      node.authors = p.authors;
      node.year = p.year;
      node.journal = p.journal;
      node.studyType = p.studyType;
      node.openalexId = p.openalexId;
      node.referencedWorks = p.referencedWorks;
      node.pmid = p.pmid;
      return (p.pmid ? fetchPubTypeCategory(p.pmid) : Promise.resolve(null)).then(function(cat){
        if (cat) node.studyType = cat;
        recomputeAutoLinks();
        pushHistory();
        render();
        alert('エビデンスの情報を取得しました:\n' + node.title);
      });
    }).catch(function(e){
      alert(apiErrorMessage(e));
      if (btn){ btn.disabled = false; btn.textContent = '取得'; }
    });
  }

  /* DOI同士の引用関係(OpenAlexのreferenced_works)から自動リンクを再構築する */
  function recomputeAutoLinks(){
    state.edges = state.edges.filter(function(e){ return !e.auto; });
    var papers = state.nodes.filter(function(n){ return n.nodeType === 'paper' && n.openalexId; });
    papers.forEach(function(a){
      papers.forEach(function(b){
        if (a === b || !a.referencedWorks) return;
        if (a.referencedWorks.indexOf(b.openalexId) !== -1){
          state.edges.push({ id: newId('edge'), sourceNodeId: a.id, targetNodeId: b.id, auto: true, direction: 'one', color: '#9e9e9e' });
        }
      });
    });
  }

  /* ---- ノード種類ごとの既定サイズ・色 ---- */
  var NODE_DEFAULTS = {
    paper:      { width: 150, height: 74, color: '#ffffff' },
    question:   { width: 170, height: 84, color: '#cfe9fb' },
    conclusion: { width: 170, height: 84, color: '#d7f0d8' },
    memo:       { width: 140, height: 74, color: '#fff4c2' }
  };

  function createNode(nodeType, x, y){
    var d = NODE_DEFAULTS[nodeType];
    var node = {
      id: newId('node'),
      nodeType: nodeType,
      x: x - d.width/2, y: y - d.height/2, width: d.width, height: d.height,
      color: d.color
    };
    if (nodeType === 'paper'){
      node.doi = ''; node.title = '新しいエビデンス'; node.authors = ''; node.year = ''; node.journal = '';
      node.studyType = 'OTHER'; node.memo = '';
    } else if (nodeType === 'question'){
      node.text = '臨床疑問をここに書く';
    } else if (nodeType === 'conclusion'){
      node.text = '自分の結論をここに書く';
    } else if (nodeType === 'memo'){
      node.text = 'メモ';
    }
    return node;
  }

  function hasNodeOfType(nodeType){
    return state.nodes.some(function(n){ return n.nodeType === nodeType; });
  }

  /* ---- 図形生成(エビデンスノードは研究種別で形が変わる) ---- */
  function pointsToStr(pts){ return pts.map(function(p){ return p[0]+','+p[1]; }).join(' '); }

  // ノードの外枠(横長になりがち)の中に、見た目が整った形(正多角形に近い比率)を
  // 中央揃えで収めるための箱。高さいっぱいは使い、横幅だけ h*ratio までに制限する。
  function shapeBox(x,y,w,h){
    var ratio = 1.25;
    var bw = Math.min(w, h * ratio);
    return { x: x + (w - bw) / 2, y: y, w: bw, h: h };
  }

  function rectPoints(x,y,w,h){ return [[x,y],[x+w,y],[x+w,y+h],[x,y+h]]; }
  function diamondPoints(x,y,w,h){ var b=shapeBox(x,y,w,h); return [[b.x+b.w/2,b.y],[b.x+b.w,b.y+b.h/2],[b.x+b.w/2,b.y+b.h],[b.x,b.y+b.h/2]]; }
  function hexagonPoints(x,y,w,h){ var b=shapeBox(x,y,w,h); var q=b.w*0.25; return [[b.x+q,b.y],[b.x+b.w-q,b.y],[b.x+b.w,b.y+b.h/2],[b.x+b.w-q,b.y+b.h],[b.x+q,b.y+b.h],[b.x,b.y+b.h/2]]; }
  function trianglePoints(x,y,w,h){ var b=shapeBox(x,y,w,h); return [[b.x+b.w/2,b.y],[b.x+b.w,b.y+b.h],[b.x,b.y+b.h]]; }
  function tagPoints(x,y,w,h){ var b=shapeBox(x,y,w,h); var n=b.w*0.2; return [[b.x,b.y+b.h*0.12],[b.x+b.w-n,b.y],[b.x+b.w,b.y+b.h/2],[b.x+b.w-n,b.y+b.h],[b.x,b.y+b.h*0.88]]; }
  function foldedRectPoints(x,y,w,h){ var f=Math.min(w,h)*0.22; return [[x,y],[x+w-f,y],[x+w,y+f],[x+w,y+h],[x,y+h]]; }
  function starPoints(x,y,w,h){
    var cx=x+w/2, cy=y+h/2, rOuter=Math.min(w,h)/2, rInner=rOuter*0.42;
    var pts=[];
    for (var i=0;i<10;i++){
      var r = (i%2===0) ? rOuter : rInner;
      var ang = -Math.PI/2 + i*Math.PI/5;
      pts.push([cx+r*Math.cos(ang), cy+r*Math.sin(ang)]);
    }
    return pts;
  }

  function paperShapeEl(node){
    var x=node.x, y=node.y, w=node.width, h=node.height;
    var st = node.studyType || 'OTHER';
    if (st === 'OTHER'){
      return svgEl('ellipse', { cx:x+w/2, cy:y+h/2, rx:w/2, ry:h/2 });
    }
    if (st === 'REVIEW'){
      return svgEl('rect', { x:x, y:y, width:w, height:h, rx:14, ry:14 });
    }
    var ptsFn = { RCT: diamondPoints, META: hexagonPoints, OBS: trianglePoints, GUIDE: starPoints, CASE: tagPoints }[st] || diamondPoints;
    return svgEl('polygon', { points: pointsToStr(ptsFn(x,y,w,h)) });
  }

  function nodeShapeEl(node){
    var x=node.x, y=node.y, w=node.width, h=node.height;
    if (node.nodeType === 'paper') return paperShapeEl(node);
    if (node.nodeType === 'memo') return svgEl('polygon', { points: pointsToStr(foldedRectPoints(x,y,w,h)) });
    // question / conclusion: 二重枠の長方形
    return svgEl('rect', { x:x, y:y, width:w, height:h, rx:8, ry:8 });
  }

  function svgEl(tag, attrs){
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function nodeLabelText(node){
    if (node.nodeType === 'paper') return node.title || '(無題のエビデンス)';
    return (node.text || '').split('\n')[0] || '(空)';
  }

  // 日本語は単語区切りがないため、ノードの大きさに応じて文字数ベースで折り返す
  function wrapLabelLines(text, node){
    text = String(text || '');
    var charWidth = 7.2; // 12pxフォントでのおおよその1文字あたりの幅(px)
    var maxCharsPerLine = Math.max(3, Math.floor((node.width - 14) / charWidth));
    var maxLines = Math.max(1, Math.floor((node.height - 16) / 15));
    var lines = [];
    var i = 0;
    while (i < text.length && lines.length < maxLines){
      var remaining = text.length - i;
      var take = Math.min(maxCharsPerLine, remaining);
      var isLastAllowedLine = (lines.length === maxLines - 1);
      if (isLastAllowedLine && remaining > take){
        lines.push(text.slice(i, i + Math.max(1, take - 1)) + '…');
      } else {
        lines.push(text.slice(i, i + take));
      }
      i += take;
    }
    if (!lines.length) lines.push('');
    return lines;
  }

  /* ---- 描画 ---- */
  function renderNode(node){
    var g = svgEl('g', { class: 'node-group', 'data-id': node.id });
    var isSelected = (selected.type==='node' && selected.id===node.id);
    var shape = nodeShapeEl(node);
    shape.setAttribute('class', 'node-shape type-' + node.nodeType + (isSelected ? ' selected' : ''));
    shape.setAttribute('fill', node.color || '#ffffff');
    g.appendChild(shape);

    if (node.nodeType === 'question' || node.nodeType === 'conclusion'){
      // 二重枠の内側の線
      var inner = svgEl('rect', { x: node.x+5, y: node.y+5, width: node.width-10, height: node.height-10, rx:5, ry:5, fill:'none', stroke:'#666', 'stroke-width':1 });
      g.appendChild(inner);
    }

    var cx = node.x + node.width/2, cy = node.y + node.height/2;
    var lines = wrapLabelLines(nodeLabelText(node), node);
    var lineHeight = 15;
    var label = svgEl('text', { x: cx, y: cy, class: 'node-label' });
    var startDy = -(lines.length-1) * lineHeight / 2;
    lines.forEach(function(line, i){
      var tspan = svgEl('tspan', { x: cx, dy: (i===0 ? startDy : lineHeight) });
      tspan.textContent = line;
      label.appendChild(tspan);
    });
    g.appendChild(label);

    if (isSelected){
      var handleSize = 10;
      var handle = svgEl('rect', {
        x: node.x+node.width-handleSize/2, y: node.y+node.height-handleSize/2,
        width: handleSize, height: handleSize, rx: 2, class: 'resize-handle'
      });
      handle.addEventListener('mousedown', function(evt){ onResizeHandleMouseDown(evt, node); });
      handle.addEventListener('touchstart', function(evt){ onResizeHandleMouseDown(evt, node); }, {passive:false});
      g.appendChild(handle);
    }

    g.addEventListener('mousedown', function(evt){ onNodeMouseDown(evt, node); });
    g.addEventListener('touchstart', function(evt){ onNodeMouseDown(evt, node); }, {passive:false});
    nodeLayer.appendChild(g);
  }

  function truncate(s, n){ s = String(s); return s.length > n ? s.slice(0,n-1) + '…' : s; }

  function nodeBoundaryPoint(node, towardX, towardY){
    var cx = node.x + node.width/2, cy = node.y + node.height/2;
    var rx = node.width/2, ry = node.height/2;
    var dx = towardX-cx, dy = towardY-cy;
    if (dx===0 && dy===0) return {x:cx,y:cy};
    var t = 1/Math.sqrt(Math.pow(dx/rx,2)+Math.pow(dy/ry,2));
    t = Math.min(t,1);
    return { x: cx+dx*t, y: cy+dy*t };
  }

  // 同じノードペアに複数のリンク(自動+手動など)がある場合、重ならないよう
  // 少しカーブさせて並べて描画するためのオフセット量を割り当てる
  function edgePairKey(edge){
    var a = edge.sourceNodeId, b = edge.targetNodeId;
    return a < b ? a+'|'+b : b+'|'+a;
  }
  function computeEdgeCurveOffsets(edges){
    var groups = {};
    edges.forEach(function(e){ var k = edgePairKey(e); (groups[k] = groups[k] || []).push(e); });
    var offsets = {};
    Object.keys(groups).forEach(function(k){
      var g = groups[k];
      var n = g.length;
      g.forEach(function(e, i){
        offsets[e.id] = (n === 1) ? 0 : (i - (n-1)/2) * 26;
      });
    });
    return offsets;
  }

  function renderEdge(edge, curveOffset){
    var s = getNode(edge.sourceNodeId), t = getNode(edge.targetNodeId);
    if (!s || !t) return;
    var scx=s.x+s.width/2, scy=s.y+s.height/2, tcx=t.x+t.width/2, tcy=t.y+t.height/2;
    var p1 = nodeBoundaryPoint(s, tcx, tcy);
    var p2 = nodeBoundaryPoint(t, scx, scy);
    var mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
    var d;
    if (curveOffset){
      var dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.sqrt(dx*dx+dy*dy)||1;
      var nx=-dy/len, ny=dx/len;
      mx = mx + nx*curveOffset; my = my + ny*curveOffset;
      d = 'M ' + p1.x + ' ' + p1.y + ' Q ' + mx + ' ' + my + ' ' + p2.x + ' ' + p2.y;
    } else {
      d = 'M ' + p1.x + ' ' + p1.y + ' L ' + p2.x + ' ' + p2.y;
    }

    var g = svgEl('g', { class: 'edge-group', 'data-id': edge.id });
    var color = edge.auto ? '#9e9e9e' : (edge.color || EDGE_CATEGORY_DEFAULT_COLOR[edge.category] || '#546e7a');
    var path = svgEl('path', { d:d, stroke: color, class: 'edge-path' + (selected.type==='edge'&&selected.id===edge.id?' selected':'') });
    if (edge.auto){
      path.setAttribute('stroke-dasharray', '6,4');
      path.setAttribute('marker-end', 'url(#arrow)');
    } else {
      if (edge.direction === 'one' || edge.direction === 'two'){
        path.setAttribute('marker-end', 'url(#arrow)');
      }
      if (edge.direction === 'two'){
        path.setAttribute('marker-start', 'url(#arrow)');
      }
    }
    var hit = svgEl('path', { d:d, class: 'edge-hit' });
    g.appendChild(path);
    g.appendChild(hit);

    if (edge.label){
      var bg = svgEl('circle', { cx:mx, cy:my, r: Math.max(10, edge.label.length*3), class:'edge-label-bg' });
      var lbl = svgEl('text', { x:mx, y:my, class:'edge-label', fill: color });
      lbl.textContent = truncate(edge.label, 10);
      g.appendChild(bg); g.appendChild(lbl);
    }

    g.addEventListener('mousedown', function(evt){ evt.stopPropagation(); selectItem('edge', edge.id); });
    edgeLayer.appendChild(g);
  }

  function render(){
    nodeLayer.innerHTML = '';
    edgeLayer.innerHTML = '';
    var offsets = computeEdgeCurveOffsets(state.edges);
    state.edges.forEach(function(e){ renderEdge(e, offsets[e.id]); });
    state.nodes.forEach(renderNode);
    document.getElementById('stat-nodes').textContent = 'ノード: ' + state.nodes.length;
    document.getElementById('stat-edges').textContent = 'リンク: ' + state.edges.length;
    renderPropPanel();
    updateAddButtonAvailability();
  }

  function updateAddButtonAvailability(){
    document.getElementById('btn-add-question').disabled = hasNodeOfType('question');
    document.getElementById('btn-add-conclusion').disabled = hasNodeOfType('conclusion');
  }

  /* ---- プロパティパネル ---- */
  function renderPropPanel(){
    if (selected.type === 'node'){
      var node = getNode(selected.id);
      if (!node) { selected = {type:null,id:null}; }
      else { renderNodePanel(node); return; }
    }
    if (selected.type === 'edge'){
      var edge = getEdge(selected.id);
      if (!edge) { selected = {type:null,id:null}; }
      else { renderEdgePanel(edge); return; }
    }
    proppanel.innerHTML = '<div class="empty">ノードまたはリンクを選ぶと、ここで内容を編集できます。</div>';
  }

  function fieldRow(labelText, inputHtml){
    return '<label>' + labelText + '</label>' + inputHtml;
  }

  function renderNodePanel(node){
    var html = '<h3>' + ({paper:'エビデンスノード',question:'臨床疑問ノード',conclusion:'自分の結論ノード',memo:'メモノート'}[node.nodeType]) + '</h3>';
    if (node.nodeType === 'paper'){
      html += '<label>DOI(任意)</label><div style="display:flex;gap:6px;"><input type="text" id="f-doi" value="'+escAttr(node.doi)+'" style="flex:1;" placeholder="10.1001/xxxxx"><button id="f-doi-fetch" style="flex:none;" title="OpenAlexから書誌情報を取得">取得</button></div>';
      html += fieldRow('タイトル', '<input type="text" id="f-title" value="'+escAttr(node.title)+'">');
      html += fieldRow('著者', '<input type="text" id="f-authors" value="'+escAttr(node.authors)+'">');
      html += '<div class="row2">' +
        '<div>' + fieldRow('発表年', '<input type="text" id="f-year" value="'+escAttr(node.year)+'">') + '</div>' +
        '<div>' + fieldRow('雑誌', '<input type="text" id="f-journal" value="'+escAttr(node.journal)+'">') + '</div>' +
      '</div>';
      html += '<label>研究種別</label><select id="f-studytype">' + STUDY_TYPES.map(function(t){
        return '<option value="'+t+'"'+(node.studyType===t?' selected':'')+'>'+STUDY_LABEL[t]+'</option>';
      }).join('') + '</select>';

  function wireInput(id, onChange){
    var el = document.getElementById(id);

    el.addEventListener('focus', function(){ preSnap = snapshot(); });
    el.addEventListener('input', function(){ onChange(el.value); });
    el.addEventListener('blur', function(){
      if (preSnap !== null && preSnap !== snapshot()){
        history.push(preSnap);
        if (history.length > 60) history.shift();
        future = [];
        autosave();
      }
      preSnap = null;
    });
  }

  /* ---- 座標変換・表示 ---- */
  function eventPoint(evt){
    if (evt.touches && evt.touches.length) return evt.touches[0];
    if (evt.changedTouches && evt.changedTouches.length) return evt.changedTouches[0];
    return evt;
  }
  function screenToWorld(evt){
    var pt = eventPoint(evt);
    var rect = svg.getBoundingClientRect();
    var sx = pt.clientX - rect.left, sy = pt.clientY - rect.top;
    return { x: (sx - view.x)/view.scale, y: (sy - view.y)/view.scale };
  }
  function applyViewTransform(){
    viewport.setAttribute('transform', 'translate('+view.x+','+view.y+') scale('+view.scale+')');
    document.getElementById('stat-zoom').textContent = 'ズーム: ' + Math.round(view.scale*100) + '%';
  }
  function computeContentBounds(){
    var minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    state.nodes.forEach(function(n){
      minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,n.x+n.width); maxY=Math.max(maxY,n.y+n.height);
    });
    if (minX===Infinity) return null;
    return {minX:minX,minY:minY,maxX:maxX,maxY:maxY};
  }
  function fitToView(){
    var b = computeContentBounds();
    var rect = svg.getBoundingClientRect();
    var w = rect.width||800, h = rect.height||600;
    if (!b){ view.scale=1; view.x=w/2; view.y=h/2; applyViewTransform(); return; }
    var padding=60;
    var cw=Math.max(b.maxX-b.minX,1), ch=Math.max(b.maxY-b.minY,1);
    var scale = Math.min(Math.max(w-padding*2,50)/cw, Math.max(h-padding*2,50)/ch, 3);
    scale = Math.max(scale,0.1);
    view.scale = scale;
    view.x = w/2 - (b.minX+b.maxX)/2*scale;
    view.y = h/2 - (b.minY+b.maxY)/2*scale;
    applyViewTransform();
  }

  /* 発表年に基づいてエビデンスノードを一度だけ整列する(常時動く物理演算ではない)。
     発表年のないノード(臨床疑問・結論・メモ、年未入力のエビデンス)は対象外で今の位置のまま。
     同じ年のノードは重ならないよう縦に並べる。 */
  function layoutByYear(){
    var dated = state.nodes.filter(function(n){
      return n.nodeType === 'paper' && n.year && !isNaN(parseInt(n.year,10));
    });
    if (dated.length < 2){
      alert('発表年が入力されているエビデンスノードが2件以上ないと整列できません。');
      return;
    }
    var years = dated.map(function(n){ return parseInt(n.year,10); });
    var minYear = Math.min.apply(null, years), maxYear = Math.max.apply(null, years);
    var yearSpan = Math.max(maxYear - minYear, 1);
    var totalWidth = Math.max(700, dated.length * 170);
    var xScale = totalWidth / yearSpan;
    var vGap = 150;

    var groups = {};
    dated.forEach(function(n){
      var y = parseInt(n.year,10);
      (groups[y] = groups[y] || []).push(n);
    });
    Object.keys(groups).forEach(function(yearKey){
      var group = groups[yearKey];
      var x = (parseInt(yearKey,10) - minYear) * xScale;
      var startY = -((group.length-1) * vGap) / 2;
      group.forEach(function(n, i){
        n.x = x - n.width/2;
        n.y = startY + i*vGap - n.height/2;
      });
    });
    pushHistory();
    render();
    fitToView();
  }

  /* ---- PNG書き出し ---- */
  function exportPng(){
    var b = computeContentBounds();
    if (!b){ alert('地図が空です。ノードを追加してから書き出してください。'); return; }
    var padding = 60;
    var w = (b.maxX - b.minX) + padding*2;
    var h = (b.maxY - b.minY) + padding*2;
    var svgNS = 'http://www.w3.org/2000/svg';

    var exportSvg = document.createElementNS(svgNS, 'svg');
    exportSvg.setAttribute('xmlns', svgNS);
    exportSvg.setAttribute('width', w);
    exportSvg.setAttribute('height', h);
    exportSvg.setAttribute('viewBox', (b.minX-padding) + ' ' + (b.minY-padding) + ' ' + w + ' ' + h);

    var defsClone = svg.querySelector('defs').cloneNode(true);
    exportSvg.appendChild(defsClone);

    var styleEl = document.createElementNS(svgNS, 'style');
    styleEl.textContent =
      '.node-shape{stroke:#666;stroke-width:1.3;}' +
      '.node-shape.type-question,.node-shape.type-conclusion{stroke-width:2;}' +
      '.node-label{font-size:12px;text-anchor:middle;dominant-baseline:middle;fill:#1C2B33;font-family:sans-serif;}' +
      '.edge-path{fill:none;stroke-width:2;}' +
      '.edge-label-bg{fill:#fff;stroke:#ccc;stroke-width:1;}' +
      '.edge-label{font-size:11px;text-anchor:middle;dominant-baseline:middle;font-family:sans-serif;}';
    exportSvg.appendChild(styleEl);

    var bg = svgEl('rect', { x:b.minX-padding, y:b.minY-padding, width:w, height:h, fill:'#ffffff' });
    exportSvg.appendChild(bg);

    var edgeClone = edgeLayer.cloneNode(true);
    var nodeClone = nodeLayer.cloneNode(true);
    edgeClone.querySelectorAll('.selected').forEach(function(el){ el.classList.remove('selected'); });
    nodeClone.querySelectorAll('.selected').forEach(function(el){ el.classList.remove('selected'); });
    nodeClone.querySelectorAll('.resize-handle').forEach(function(el){ el.remove(); });
    nodeClone.querySelectorAll('.edge-hit').forEach(function(el){ el.remove(); });
    edgeClone.querySelectorAll('.edge-hit').forEach(function(el){ el.remove(); });
    exportSvg.appendChild(edgeClone);
    exportSvg.appendChild(nodeClone);

    var serializer = new XMLSerializer();
    var svgString = serializer.serializeToString(exportSvg);
    var svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(svgBlob);

    var img = new Image();
    img.onload = function(){
      var scale = 2;
      var canvasEl = document.createElement('canvas');
      canvasEl.width = w*scale; canvasEl.height = h*scale;
      var ctx = canvasEl.getContext('2d');
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      canvasEl.toBlob(function(blob){
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (state.title || 'pathfinder-map').replace(/[\\/:*?"<>|]/g,'_') + '.png';
        document.body.appendChild(a); a.click(); a.remove();
      });
    };
    img.onerror = function(){
      URL.revokeObjectURL(url);
      alert('PNGの書き出しに失敗しました。');
    };
    img.src = url;
  }

  /* ---- マウス/タッチ操作 ---- */
  function onNodeMouseDown(evt, node){
    evt.preventDefault(); evt.stopPropagation();
    if (tool === 'add-edge'){
      if (!edgeDraftSource){
        edgeDraftSource = node.id;
      } else if (edgeDraftSource !== node.id){
        var edge = {
          id: newId('edge'), sourceNodeId: edgeDraftSource, targetNodeId: node.id,
          category: 'free', label: '', color: EDGE_CATEGORY_DEFAULT_COLOR.free, direction: 'one'
        };
        state.edges.push(edge);
        pushHistory();
        setTool('select');
        selectItem('edge', edge.id);
      }
      return;
    }
    selectItem('node', node.id);
    var startWorld = screenToWorld(evt);
    dragging = { id: node.id, offX: startWorld.x - node.x, offY: startWorld.y - node.y };
  }

  function onResizeHandleMouseDown(evt, node){
    evt.preventDefault(); evt.stopPropagation();
    resizing = { id: node.id };
  }

  svg.addEventListener('mousedown', function(evt){
    if (evt.target !== svg && evt.target !== viewport && evt.target.id !== 'canvas') return;
    if (tool.indexOf('add-') === 0 && tool !== 'add-edge'){
      var nodeType = tool.replace('add-','');
      if ((nodeType==='question' && hasNodeOfType('question')) || (nodeType==='conclusion' && hasNodeOfType('conclusion'))) return;
      var w = screenToWorld(evt);
      var node = createNode(nodeType, w.x, w.y);
      state.nodes.push(node);
      if (nodeType === 'question') refreshTitleDisplay();
      pushHistory();
      setTool('select');
      selectItem('node', node.id);
      return;
    }
    if (tool === 'select'){
      selectItem(null, null);
      isPanning = true;
      panStart = { x: eventPoint(evt).clientX - view.x, y: eventPoint(evt).clientY - view.y };
    }
  });

  window.addEventListener('mousemove', function(evt){
    if (dragging){
      var w = screenToWorld(evt);
      var node = getNode(dragging.id);
      if (node){ node.x = w.x - dragging.offX; node.y = w.y - dragging.offY; renderQuiet(); }
    } else if (resizing){
      var w2 = screenToWorld(evt);
      var rnode = getNode(resizing.id);
      if (rnode){
        rnode.width = Math.max(MIN_NODE_WIDTH, w2.x - rnode.x);
        rnode.height = Math.max(MIN_NODE_HEIGHT, w2.y - rnode.y);
        renderQuiet();
      }
    } else if (isPanning && panStart){
      view.x = eventPoint(evt).clientX - panStart.x;
      view.y = eventPoint(evt).clientY - panStart.y;
      applyViewTransform();
    }
  });
  window.addEventListener('mouseup', function(){
    if (dragging){ dragging = null; pushHistory(); render(); }
    if (resizing){ resizing = null; pushHistory(); render(); }
    isPanning = false; panStart = null;
  });

  svg.addEventListener('wheel', function(evt){
    evt.preventDefault();
    var factor = evt.deltaY < 0 ? 1.1 : 0.9;
    var rect = svg.getBoundingClientRect();
    var mx = evt.clientX-rect.left, my = evt.clientY-rect.top;
    var wx = (mx-view.x)/view.scale, wy = (my-view.y)/view.scale;
    view.scale = Math.min(Math.max(view.scale*factor, 0.1), 4);
    view.x = mx - wx*view.scale;
    view.y = my - wy*view.scale;
    applyViewTransform();
  }, { passive:false });

  /* 既にこの地図にあるエビデンスノードと同じ内容か(DOI・PMID・OpenAlex IDのいずれか一致で判定) */
  function findExistingPaperNode(cp){
    var doi = (cp.doi || '').trim().toLowerCase();
    var pmid = (cp.pmid || '').trim();
    var oaId = (cp.id || '').trim();
    return state.nodes.find(function(n){
      if (n.nodeType !== 'paper') return false;
      if (doi && (n.doi || '').trim().toLowerCase() === doi) return true;
      if (pmid && (n.pmid || '').trim() === pmid) return true;
      if (oaId && (n.openalexId || '').trim() === oaId) return true;
      return false;
    });

  function importPapersFromCitrail(papers){
    var x0 = 120, y0 = 120, added = 0, skipped = 0;
    papers.forEach(function(cp){
      if (findExistingPaperNode(cp)){ skipped++; return; }
      var node = createNode('paper', x0 + (added % 4) * 190, y0 + Math.floor(added/4) * 130);
      node.title = cp.title || node.title;
      node.authors = Array.isArray(cp.authors) ? cp.authors.join(', ') : (cp.authors || '');
      node.year = (cp.year != null) ? String(cp.year) : '';
      node.journal = cp.journal || '';
      node.doi = cp.doi || '';
      node.pmid = cp.pmid || '';
      node.openalexId = cp.id || null;
      node.referencedWorks = Array.isArray(cp.referencedWorks) ? cp.referencedWorks : [];
      node.studyType = (STUDY_TYPES.indexOf(cp.study) !== -1) ? cp.study : 'OTHER';
      state.nodes.push(node);
      added++;
    });
    recomputeAutoLinks();
    pushHistory();
    render();
    fitToView();
    if (skipped > 0){
      alert(added + '件を追加しました。' + skipped + '件はすでにこの地図にあるエビデンスと同じ(DOI・PMID・OpenAlex IDが一致)ため、重複して追加しませんでした。');
    }
  }

  function checkIncomingHandoff(){
    if (!HAS_STORAGE) return;
    var raw;
    try { raw = localStorage.getItem(PF_HANDOFF_KEY); } catch(e){ return; }
    if (!raw) return;
    try { localStorage.removeItem(PF_HANDOFF_KEY); } catch(e){}
    var payload;
    try { payload = JSON.parse(raw); } catch(e){ payload = null; }
    if (!payload || !Array.isArray(payload.papers) || !payload.papers.length) return;

    // Citrail側で送り先の地図が指定されているので、確認ダイアログは出さずそのまま従う
    var opened = payload.targetMapId ? openMap(payload.targetMapId) : false;
    if (!opened) createNewMap();
    importPapersFromCitrail(payload.papers);
  }

  /* ---- 起動 ---- */
  loadInitialMap();
  checkIncomingHandoff();
})();
</script>
</body>
</html>
